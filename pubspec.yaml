name: rybbit_unofficial
description: Unofficial mobile client for Rybbit analytics
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  go_router: ^17.1.0
  dio: ^5.9.2
  cookie_jar: ^4.0.9
  dio_cookie_manager: ^3.4.0
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^10.0.0
  fl_chart: ^1.2.0
  intl: ^0.20.2
  sentry_flutter: ^9.15.0
  sentry_dio: ^9.15.0
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/rybbit_icon.png
    - assets/rybbit_horizontal_white.png
